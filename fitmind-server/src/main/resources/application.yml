spring:
  profiles:
    active: dev
  application:
    name: fitmind-server
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:200MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:200MB}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

ai:
  deepseek:
    api-url: ${AI_API_URL:https://api.deepseek.com/v1}
    api-key: ${AI_API_KEY}
  qwen:
    api-url: ${QWEN_API_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${QWEN_API_KEY}
    vision-model: ${QWEN_VISION_MODEL:qwen3.6-plus}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

fitness-vision:
  python-executable: ${FITNESS_VISION_PYTHON:python}
  script-path: ${FITNESS_VISION_SCRIPT:../Fitness model/infer_action_json.py}
  model-path: ${FITNESS_VISION_MODEL:../Fitness model/trained_models/best_model.pth}
  class-mapping-path: ${FITNESS_VISION_CLASS_MAPPING:../Fitness model/processed_data/class_mapping.json}
  working-directory: ${FITNESS_VISION_WORKDIR:../Fitness model}
  upload-dir: ${FITNESS_VISION_UPLOAD_DIR:./uploads/fitness-vision}
  timeout-seconds: ${FITNESS_VISION_TIMEOUT_SECONDS:180}
