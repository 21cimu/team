spring:
  config:
    import: optional:classpath:application-local.yml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/fitmind?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:fitmind-local-dev-secret-key-2026-unsafe-change-me}

fitness-vision:
  python-executable: ${FITNESS_VISION_PYTHON:D:/fitmind_env_py312/Scripts/python.exe}
